# =========================================================================
# MediGuard CI
# Runs on every push to main and every pull request targeting main.
# Pipeline: lint -> format check -> type check -> tests
# =========================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege permissions for the GITHUB_TOKEN.
permissions:
  contents: read

# Cancel any in-progress run for the same branch when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |

          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type check (mypy)
        run: mypy app

      - name: Run tests (pytest)
        run: pytest -v
